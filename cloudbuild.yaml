steps:
  # This uses the official Google SDK to build your Next.js app with buildpacks 
  # and deploy it to Cloud Run in one robust step.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'famous-sheamus-website'
      - '--source'
      - '.'
      - '--region'
      - 'us-central1'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/famous-sheamus-website:$COMMIT_SHA'
      - '--quiet'

# This satisfies the Service Account logging requirement
options:
  logging: CLOUD_LOGGING_ONLY